# ============================================================
# OpenWrt 自动编译配置文件
# ============================================================
# 此配置文件定义了 GitHub Actions 自动编译流程的基本参数
# 可以被各个设备配置覆盖
# ============================================================

# OpenWrt 源码仓库地址
# 使用 mgz0227 维护的 OpenWrt fork
# 该仓库包含了对新内核版本的支持和各种优化
REPO_URL="https://github.com/mgz0227/openwrt"

# 源码仓库分支
# openwrt-25.12 是 OpenWrt 25.12 版本分支
# 这是 OpenWrt 的稳定版本分支
# 注意：实际编译时可能会被 kernel_6.18.sh 或 kernel_6.12.sh 脚本切换到其他分支
REPO_BRANCH="openwrt-25.12"

# 编译配置文件名
# .config 是 OpenWrt 的编译配置文件
# 定义了要编译的软件包、内核选项等
# 该文件位于 devices/common/ 目录下
CONFIG_FILE=".config"

# DIY 脚本文件名
# diy.sh 是自定义修改脚本
# 在编译前运行，用于自定义 OpenWrt 固件
# 该文件位于 devices/common/ 目录下
DIY_SH="diy.sh"

# 是否释放磁盘空间
# false: 不释放磁盘空间
# true: 在编译前删除不必要的文件以释放空间
# GitHub Actions 提供的磁盘空间有限，可能需要释放空间
FREE_UP_DISK="false"

# 是否上传 bin 目录到 Artifact
# true: 上传 bin 目录（包含所有编译产物）
# false: 不上传
# bin 目录包含编译生成的所有文件，体积较大
# 用于调试或需要完整编译产物时启用
UPLOAD_BIN_DIR_FOR_ARTIFACT="true"

# 是否上传固件到 Artifact
# true: 上传固件文件到 GitHub Actions Artifact
# false: 不上传
# Artifact 是 GitHub Actions 的临时存储，保留 90 天
# 上传后可以从 Actions 页面下载固件
UPLOAD_FIRMWARE_FOR_ARTIFACT="true"

# 是否上传固件到 Release
# true: 创建 GitHub Release 并上传固件
# false: 不创建 Release
# Release 是永久存储，会创建新的 tag 和 release 页面
# 适合正式发布的固件版本
UPLOAD_FIRMWARE_FOR_RELEASE="true"

# 是否上传固件到奶牛快传 (CowTransfer)
# true: 上传到奶牛快传（国内网盘）
# false: 不上传
# 奶牛快传是国内文件分享服务，方便国内用户下载
# 需要配置相应的 API 密钥
UPLOAD_FIRMWARE_TO_COWTRANSFER="false"

# 是否上传固件到 WeTransfer
# true: 上传到 WeTransfer（国际网盘）
# false: 不上传
# WeTransfer 是国际文件分享服务，方便海外用户下载
# 免费版文件保留 7 天
UPLOAD_FIRMWARE_TO_WETRANSFER="true"

# ============================================================
# 配置说明：
# 
# 1. 设备特定配置可以覆盖这些通用配置
#    例如：devices/x86_64/settings.ini 可以覆盖 REPO_BRANCH 等
# 
# 2. 上传选项说明：
#    - Artifact: GitHub 临时存储，90 天后过期，适合测试版本
#    - Release: GitHub 永久存储，适合正式发布版本
#    - CowTransfer: 国内网盘，方便国内用户下载
#    - WeTransfer: 国际网盘，方便海外用户下载
# 
# 3. 编译流程：
#    a. 克隆 REPO_URL 指定的仓库
#    b. 切换到 REPO_BRANCH 分支
#    c. 复制 devices/common/ 和 devices/<target>/ 下的配置文件
#    d. 执行 DIY_SH 脚本进行自定义修改
#    e. 开始编译
#    f. 根据配置上传固件
# ============================================================
